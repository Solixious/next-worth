<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>

<header th:fragment="header" class="site-header" id="siteHeader">
    <div class="container">
        <div class="header-inner">
            <a th:href="@{/}" class="logo">
                <img th:src="@{/favicon-light.png}" alt="NextWorth" class="logo-img logo-img-light">
                <img th:src="@{/favicon.png}"       alt="NextWorth" class="logo-img logo-img-dark">
                <span class="logo-text">NextWorth</span>
            </a>

            <nav class="main-nav" id="mainNav" aria-label="Main navigation">
                <ul>
                    <li><a th:href="@{/}">Home</a></li>

                    <!-- Wealth Tracking -->
                    <li class="nav-dropdown">
                        <button type="button" class="nav-dropdown-trigger" aria-haspopup="true" aria-expanded="false">
                            Wealth Tracking
                            <svg class="nav-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <ul class="nav-dropdown-menu">
                            <li><a th:href="@{/net-worth-calculator}">
                                <span class="dd-icon">NW</span>Net Worth Calculator
                            </a></li>
                            <li><a th:href="@{/fire-calculator}">
                                <span class="dd-icon">FI</span>FIRE Calculator
                            </a></li>
                            <li><a th:href="@{/goal-corpus-calculator}">
                                <span class="dd-icon">GC</span>Goal Corpus Calculator
                            </a></li>
                        </ul>
                    </li>

                    <!-- Loans & Borrowing -->
                    <li class="nav-dropdown">
                        <button type="button" class="nav-dropdown-trigger" aria-haspopup="true" aria-expanded="false">
                            Loans &amp; Borrowing
                            <svg class="nav-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <ul class="nav-dropdown-menu">
                            <li><a th:href="@{/emi-calculator}">
                                <span class="dd-icon">EM</span>EMI Calculator
                            </a></li>
                        </ul>
                    </li>

                    <!-- Investments & Savings -->
                    <li class="nav-dropdown">
                        <button type="button" class="nav-dropdown-trigger" aria-haspopup="true" aria-expanded="false">
                            Investments &amp; Savings
                            <svg class="nav-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
                        </button>
                        <ul class="nav-dropdown-menu">
                            <li><a th:href="@{/sip-calculator}">
                                <span class="dd-icon">SI</span>SIP Calculator
                            </a></li>
                            <li><a th:href="@{/fd-calculator}">
                                <span class="dd-icon">FD</span>FD Calculator
                            </a></li>
                        </ul>
                    </li>
                </ul>
            </nav>

            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">
                    <!-- Sun icon (shown in dark mode to switch to light) -->
                    <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"/>
                        <line x1="12" y1="2"  x2="12" y2="5"/>
                        <line x1="12" y1="19" x2="12" y2="22"/>
                        <line x1="2"  y1="12" x2="5"  y2="12"/>
                        <line x1="19" y1="12" x2="22" y2="12"/>
                        <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
                        <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
                        <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
                        <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
                    </svg>
                    <!-- Moon icon (shown in light mode to switch to dark) -->
                    <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button id="navToggle" class="nav-toggle" type="button"
                        aria-label="Toggle menu" aria-expanded="false" aria-controls="mainNav">
                    <span class="nav-toggle-bar"></span>
                    <span class="nav-toggle-bar"></span>
                    <span class="nav-toggle-bar"></span>
                </button>
            </div>
        </div>
    </div>
</header>

</body>
</html>
